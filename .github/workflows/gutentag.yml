name: Gutentag, World!

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - run: sudo apt-get install -y g++

      - name: Run
        run: g++ -o gutentag gutentag.cpp && ./gutentag

      - name: Verify output
        run: bash test.sh
